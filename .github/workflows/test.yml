name: Test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test_and_check_coverage:
    runs-on: [self-hosted, linux]
    steps:
    - uses: actions/checkout@v7
      with:
        fetch-depth: 0
        submodules: recursive
    - name: "Setup Dotnet for use with actions"
      uses: actions/setup-dotnet@v5
      with:
        global-json-file: global.json
    - name: "Test"
      working-directory: Fronter.NET.Tests
      shell: pwsh
      run: |
       dotnet test --coverlet --coverlet-output-format lcov --coverlet-exclude "[commonItems]*" --coverlet-file-prefix fronter
    - name: "Locate coverage report"
      id: coverage_report
      shell: pwsh
      run: |
        $coverageFile = Get-ChildItem "Fronter.NET.Tests/bin/Debug/net10.0/TestResults/fronter.coverage*.info" |
          Sort-Object LastWriteTime -Descending |
          Select-Object -First 1 -ExpandProperty FullName

        if (-not $coverageFile) {
          throw "Coverage report not found."
        }

        "path=$coverageFile" >> $env:GITHUB_OUTPUT
    - name: Publish coverage report to coveralls.io
      uses: coverallsapp/github-action@master
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        path-to-lcov: ${{ steps.coverage_report.outputs.path }}

  test:
    strategy:
      matrix:
        os: [[self-hosted, windows], macos-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v7
      with:
        fetch-depth: 0
        submodules: recursive
    - name: "Setup Dotnet for use with actions"
      uses: actions/setup-dotnet@v5
      # don't run on self-hosted Windows
      if: ${{ !contains(toJSON(matrix.os), 'windows') || !contains(toJSON(matrix.os), 'self-hosted') }}
      with:
        global-json-file: global.json
    - name: "Test"
      working-directory: Fronter.NET.Tests
      run: |
       dotnet test
